name: oouzoo
description: "OOUZOO (우주) - Our Little Universe. A local-first couple app."
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # --- Database ---
  sqflite: ^2.3.3+1          # Local SQLite storage
  path: ^1.9.0               # File path utilities

  # --- Firebase ---
  firebase_core: ^3.4.0
  firebase_database: ^11.1.1  # Realtime DB (relay-only, auto-delete)
  firebase_messaging: ^15.1.1 # FCM push notifications

  # --- State Management ---
  riverpod: ^2.5.1
  flutter_riverpod: ^2.5.1

  # --- Ads & Monetization ---
  google_mobile_ads: ^5.1.0
  in_app_purchase: ^3.2.0

  # --- Notifications ---
  flutter_local_notifications: ^17.2.2

  # --- Backup / Share ---
  path_provider: ^2.1.4       # Access file system
  share_plus: ^10.0.2         # Export JSON backup
  file_picker: ^8.1.2         # Import JSON backup

  # --- UI & Utils ---
  shared_preferences: ^2.3.2  # Simple key-value (prefs, flags)
  intl: ^0.19.0               # Date formatting
  uuid: ^4.4.2                # Unique IDs for messages
  connectivity_plus: ^6.0.5   # Network state check

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/planets/
    - assets/images/pets/
    - assets/images/items/
    - assets/images/backgrounds/
    - assets/images/ui/
